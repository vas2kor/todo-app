services:
  backend:
    build:
      context: ./backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data:/data

  frontend:
    build:
      context: ./frontend
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
      - VITE_SOCKET_URL=http://localhost:8000
    ports:
      - "5500:5500"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
